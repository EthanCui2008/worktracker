<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WorkTracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="app">
      <!-- Header -->
      <header class="header">
        <div class="header-logo">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
          <span>WorkTracker</span>
        </div>
      </header>

      <!-- Clock -->
      <section id="clock-section" class="section section--clock">
        <div id="clock" class="clock"></div>
        <div id="clock-date" class="clock-date"></div>
      </section>

      <!-- Timers -->
      <section id="timer-section" class="section">
        <div class="section-header">
          <svg class="section-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10 2h4"/><path d="M12 14l2-2"/>
            <circle cx="12" cy="14" r="8"/>
          </svg>
          <h2 class="section-title">Timers</h2>
        </div>

        <div class="timer-tabs">
          <button class="tab active" data-timer="work">
            <span class="tab-dot tab-dot--work"></span>
            Work
          </button>
          <button class="tab" data-timer="break">
            <span class="tab-dot tab-dot--break"></span>
            Break
          </button>
          <button class="tab" data-timer="stopwatch">
            <span class="tab-dot tab-dot--stopwatch"></span>
            Stopwatch
          </button>
        </div>

        <!-- Work Timer -->
        <div id="timer-work" class="timer-panel active">
          <div class="timer-ring">
            <div class="timer-display" id="work-display">00:00:00</div>
          </div>
          <div class="timer-label">Session time</div>
          <div class="timer-controls">
            <button id="work-start" class="btn btn-primary">
              <svg class="btn-icon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
              Start
            </button>
            <button id="work-reset" class="btn btn-secondary">Reset</button>
          </div>
        </div>

        <!-- Break Timer -->
        <div id="timer-break" class="timer-panel">
          <div class="timer-ring">
            <div class="timer-display" id="break-display">00:00:00</div>
          </div>
          <div class="timer-label">Current break</div>
          <div class="timer-controls">
            <button id="break-start" class="btn btn-primary">
              <svg class="btn-icon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
              Start
            </button>
            <button id="break-reset" class="btn btn-secondary">Reset</button>
          </div>
          <div class="cumulative-card">
            <span class="cumulative-label">Total break time</span>
            <span class="cumulative-value" id="break-cumulative">00:00</span>
          </div>
        </div>

        <!-- 20-min Stopwatch -->
        <div id="timer-stopwatch" class="timer-panel">
          <div class="timer-ring">
            <svg class="progress-ring" width="160" height="160" viewBox="0 0 160 160">
              <circle class="progress-ring__bg" cx="80" cy="80" r="70" fill="none" stroke-width="4"/>
              <circle id="stopwatch-progress" class="progress-ring__fill" cx="80" cy="80" r="70" fill="none" stroke-width="4"
                stroke-dasharray="439.82" stroke-dashoffset="0"
                transform="rotate(-90 80 80)"/>
            </svg>
            <div class="timer-display timer-display--overlay" id="stopwatch-display">20:00</div>
          </div>
          <div class="timer-label">20-minute countdown</div>
          <div class="timer-controls">
            <button id="stopwatch-start" class="btn btn-primary">
              <svg class="btn-icon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
              Start
            </button>
            <button id="stopwatch-reset" class="btn btn-secondary">Reset</button>
          </div>
          <div class="cumulative-card">
            <span class="cumulative-label">Cumulative break time</span>
            <span class="cumulative-value" id="stopwatch-cumulative">00:00</span>
          </div>
        </div>

        <div class="section-divider"></div>
        <button id="switch-timer" class="btn btn-switch">
          <svg class="btn-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/>
            <polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>
          </svg>
          Switch Timer
        </button>
      </section>

      <!-- Noise Generator -->
      <section id="noise-section" class="section">
        <div class="section-header">
          <svg class="section-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
          </svg>
          <h2 class="section-title">Noise Generator</h2>
        </div>

        <div class="noise-controls">
          <div class="noise-type-row">
            <button class="noise-btn active" data-noise="white">
              <span class="noise-btn-dot noise-btn-dot--white"></span>
              White
            </button>
            <button class="noise-btn" data-noise="pink">
              <span class="noise-btn-dot noise-btn-dot--pink"></span>
              Pink
            </button>
            <button class="noise-btn" data-noise="brown">
              <span class="noise-btn-dot noise-btn-dot--brown"></span>
              Brown
            </button>
          </div>

          <div class="slider-group">
            <svg class="slider-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
              <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
              <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
            </svg>
            <input type="range" id="noise-volume" min="0" max="100" value="30" />
            <span class="slider-value" id="volume-label">30%</span>
          </div>

          <button id="noise-toggle" class="btn btn-primary">
            <svg class="btn-icon" id="noise-icon-play" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            <span id="noise-label">Play</span>
          </button>
        </div>
      </section>

      <!-- Footer -->
      <footer class="footer">
        <span>WorkTracker</span>
        <span class="footer-sep">&middot;</span>
        <span>Stay focused</span>
      </footer>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
